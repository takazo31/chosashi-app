<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>調査士 復習アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-mid: #2d2d4a;
    --ink-light: #6b6b8a;
    --bg: #f4f2ed;
    --bg-dark: #e8e4db;
    --white: #ffffff;
    --accent: #4a6741;
    --accent-light: #6a8f60;
    --accent-pale: #e8f0e6;
    --blue: #2c4a6e;
    --blue-light: #e8eef4;
    --rule: #d0ccc2;
    --warn: #c0392b;
    --warn-pale: #fdf0ef;
    --gold: #b8860b;
    --gold-pale: #fdf8e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 0 16px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .nav-tabs {
    display: flex;
    gap: 2px;
  }
  .tab-btn {
    background: none;
    border: none;
    color: rgba(244,242,237,0.6);
    padding: 6px 12px;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--accent);
    color: white;
  }

  /* LAYOUT */
  .layout {
    display: flex;
    min-height: calc(100vh - 48px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--ink-mid);
    color: var(--bg);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar-sec {
    padding: 10px 14px 6px;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-light);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .tree-item {
    padding: 8px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: all 0.15s;
    user-select: none;
  }
  .tree-item:hover { background: rgba(255,255,255,0.06); }
  .tree-item.active {
    background: rgba(74,103,65,0.35);
    border-left-color: var(--accent-light);
    color: #a8d4a0;
  }
  .tree-item .count {
    margin-left: auto;
    font-size: 0.65rem;
    background: rgba(255,255,255,0.12);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .tree-children { padding-left: 10px; }
  .tree-children .tree-item {
    font-size: 0.75rem;
    color: rgba(244,242,237,0.7);
    padding: 6px 14px;
  }

  /* STATS BAR */
  .stats-bar {
    padding: 10px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: auto;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: rgba(244,242,237,0.6);
    margin-bottom: 4px;
  }
  .stat-val { color: var(--bg); font-weight: 700; }
  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent-light);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    min-width: 0;
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* UPLOAD VIEW */
  .upload-view {
    padding: 24px 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  .upload-zone {
    border: 2px dashed var(--rule);
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--white);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-pale);
  }
  .upload-icon { font-size: 3rem; margin-bottom: 12px; }
  .upload-zone h3 {
    font-size: 1rem;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .upload-zone p {
    font-size: 0.8rem;
    color: var(--ink-light);
    line-height: 1.7;
  }
  .upload-btn {
    display: inline-block;
    margin-top: 16px;
    background: var(--accent);
    color: white;
    padding: 8px 20px;
    border-radius: 5px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  #fileInput { display: none; }

  .loaded-list {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .loaded-item {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
  }
  .loaded-item .genre-tag {
    font-size: 0.68rem;
    background: var(--accent-pale);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .loaded-item .remove-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 1rem;
  }

  /* NOTES VIEW */
  .notes-view { padding: 16px; }
  .notes-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .notes-header h2 { font-size: 1rem; font-weight: 700; }
  .notes-header .badge {
    background: var(--accent-pale);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.72rem;
  }
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .note-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: box-shadow 0.2s;
    border-top: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .note-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .note-card-title { font-size: 0.88rem; font-weight: 700; line-height: 1.4; }
  .note-card-preview {
    font-size: 0.76rem;
    color: var(--ink-light);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }
  .note-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .note-card-date { font-size: 0.68rem; color: var(--ink-light); }
  .quiz-start-btn {
    background: var(--blue);
    color: white;
    border: none;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* NOTE DETAIL */
  .note-detail { padding: 16px; max-width: 700px; }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 0.82rem;
    margin-bottom: 16px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 0;
  }
  .back-btn:hover { color: var(--ink); }
  .note-detail-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 20px;
  }
  .note-detail-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.2rem;
    margin-bottom: 6px;
  }
  .note-detail-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 0.7rem;
    padding: 2px 10px;
    border-radius: 10px;
  }
  .meta-tag.genre { background: var(--accent-pale); color: var(--accent); }
  .meta-tag.date { background: var(--bg-dark); color: var(--ink-light); }
  .note-detail-content {
    font-size: 0.85rem;
    line-height: 1.9;
    color: var(--ink-mid);
    white-space: pre-wrap;
    border-top: 1px solid var(--rule);
    padding-top: 16px;
  }
  .note-detail-actions {
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }
  .action-btn {
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    border: none;
    transition: opacity 0.2s;
  }
  .action-btn:hover { opacity: 0.85; }
  .action-btn.primary { background: var(--blue); color: white; }
  .action-btn.secondary { background: var(--bg-dark); color: var(--ink); }

  /* QUIZ VIEW */
  .quiz-view { padding: 16px; max-width: 600px; margin: 0 auto; }
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .quiz-header h2 { font-size: 0.95rem; font-weight: 700; }
  .quiz-progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--ink-light);
  }
  .quiz-progress-bar {
    width: 100px;
    height: 6px;
    background: var(--bg-dark);
    border-radius: 3px;
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .quiz-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .quiz-type-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
  }
  .quiz-question {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .quiz-source {
    font-size: 0.72rem;
    color: var(--ink-light);
    margin-bottom: 16px;
    padding: 6px 10px;
    background: var(--bg);
    border-radius: 4px;
    border-left: 3px solid var(--rule);
  }
  .answer-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .answer-input {
    width: 100%;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 0.85rem;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    min-height: 80px;
  }
  .answer-input:focus { border-color: var(--accent); }
  .choice-btn {
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.84rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .choice-btn:hover { background: var(--accent-pale); border-color: var(--accent); }
  .choice-btn.correct { background: var(--accent-pale); border-color: var(--accent); color: var(--accent); }
  .choice-btn.wrong { background: var(--warn-pale); border-color: var(--warn); color: var(--warn); }
  .choice-btn.reveal { background: var(--gold-pale); border-color: var(--gold); }

  .submit-btn {
    width: 100%;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 12px;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.2s;
  }
  .submit-btn:hover { background: #3a5f8a; }

  .answer-result {
    padding: 14px;
    border-radius: 6px;
    font-size: 0.84rem;
    line-height: 1.7;
    display: none;
  }
  .answer-result.correct { background: var(--accent-pale); border: 1px solid var(--accent); color: var(--accent); }
  .answer-result.wrong { background: var(--warn-pale); border: 1px solid var(--warn); color: var(--warn); }
  .answer-result.show { display: block; }
  .answer-result strong { display: block; margin-bottom: 4px; font-size: 0.9rem; }

  .next-btn {
    width: 100%;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 12px;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    display: none;
    margin-top: 8px;
  }
  .next-btn.show { display: block; }

  /* RESULT */
  .result-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
  }
  .result-score {
    font-family: 'Noto Serif JP', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin: 16px 0 8px;
  }
  .result-label { font-size: 0.8rem; color: var(--ink-light); }
  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
  }
  .breakdown-item { text-align: center; }
  .breakdown-val { font-size: 1.4rem; font-weight: 700; }
  .breakdown-val.ok { color: var(--accent); }
  .breakdown-val.ng { color: var(--warn); }
  .breakdown-lbl { font-size: 0.72rem; color: var(--ink-light); }
  .weak-list {
    text-align: left;
    margin-top: 16px;
    border-top: 1px solid var(--rule);
    padding-top: 14px;
  }
  .weak-list h4 { font-size: 0.82rem; color: var(--warn); margin-bottom: 8px; }
  .weak-item {
    font-size: 0.78rem;
    color: var(--ink-mid);
    padding: 4px 0;
    border-bottom: 1px solid var(--bg-dark);
    line-height: 1.5;
  }

  /* LOADING */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  .loading-overlay.show { display: flex; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--bg); font-size: 0.85rem; }

  /* EMPTY */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-light);
    gap: 10px;
  }
  .empty-icon { font-size: 3rem; opacity: 0.4; }
  .empty-text { font-size: 0.82rem; line-height: 1.7; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink);
    color: var(--bg);
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 0.8rem;
    z-index: 300;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MOBILE */
  .sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--bg);
    font-size: 1.2rem;
    cursor: pointer;
  }
  @media (max-width: 640px) {
    .sidebar {
      position: fixed;
      top: 48px; left: 0; bottom: 0;
      z-index: 150;
      transform: translateX(-100%);
      transition: transform 0.3s;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: block; }
    .notes-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="logo">
      <div class="logo-mark">📐</div>
      調査士 復習
    </div>
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showView('notes-list',this)">ノート</button>
    <button class="tab-btn" onclick="showView('upload',this)">読込</button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-sec">ジャンルツリー</div>
    <div id="genreTree"></div>
    <div class="stats-bar" id="statsBar"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">

    <!-- UPLOAD VIEW -->
    <div class="view active upload-view" id="view-upload">
      <div class="upload-zone" id="uploadZone"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
        onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📂</div>
        <h3>.mdファイルをアップロード</h3>
        <p>学習アプリでダウンロードした<br>.mdファイルをここにドロップ<br>または複数ファイルを一括選択</p>
        <div class="upload-btn">ファイルを選択</div>
      </div>
      <input type="file" id="fileInput" accept=".md" multiple onchange="onFileSelect(event)">
      <div class="loaded-list" id="loadedList"></div>
      <div style="margin-top:16px;padding:14px;background:var(--blue-light);border-radius:8px;font-size:0.78rem;color:var(--blue);line-height:1.8;" id="uploadTip">
        💡 <strong>Obsidianとの連携：</strong><br>
        ObsidianのVaultフォルダから.mdファイルを選択するとそのまま読み込めます。<br>
        複数ファイルを一括選択するとジャンルごとに自動分類します。
      </div>
    </div>

    <!-- NOTES LIST VIEW -->
    <div class="view notes-view" id="view-notes-list">
      <div id="notesListContent"></div>
    </div>

    <!-- NOTE DETAIL VIEW -->
    <div class="view note-detail" id="view-note-detail">
      <button class="back-btn" onclick="backToList()">← ノート一覧に戻る</button>
      <div class="note-detail-card" id="noteDetailContent"></div>
    </div>

    <!-- QUIZ VIEW -->
    <div class="view quiz-view" id="view-quiz">
      <div id="quizContent"></div>
    </div>

  </main>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">AIがクイズを生成中...</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let notes = [];
let currentGenreFilter = null;
let quizData = [];
let quizIndex = 0;
let quizResults = [];
let currentNoteIndex = null;

// ===== GENRE CONFIG =====
const GENRES = ['不動産登記法','民法','測量','建物調査','土地調査','筆界特定','その他'];
const GENRE_ICONS = {
  '不動産登記法':'📋','民法':'⚖️','測量':'📐','建物調査':'🏠',
  '土地調査':'🗾','筆界特定':'🔲','その他':'📌'
};

// ===== PARSE MD =====
function parseMd(filename, content) {
  const titleMatch = content.match(/^title:\s*"?(.+?)"?\s*$/m);
  const genreMatch = content.match(/^genre:\s*(.+?)\s*$/m);
  const dateMatch = content.match(/^date:\s*(.+?)\s*$/m);
  const tagsMatch = content.match(/^tags:\s*\[(.+?)\]/m);

  let title = titleMatch ? titleMatch[1] : filename.replace('.md','');
  let genre = genreMatch ? genreMatch[1].trim() : '未分類';
  let date = dateMatch ? dateMatch[1] : '';
  let tags = tagsMatch ? tagsMatch[1] : '';

  // ジャンルの正規化
  if (!GENRES.includes(genre)) {
    const found = GENRES.find(g => genre.includes(g) || g.includes(genre));
    genre = found || 'その他';
  }

  // フロントマターを除いた本文
  let body = content.replace(/^---[\s\S]*?---\n?/, '').trim();
  // H1タイトルを除去
  body = body.replace(/^#\s+.+\n?/, '').trim();

  return { id: Date.now() + Math.random(), filename, title, genre, date, tags, body };
}

// ===== FILE HANDLING =====
function onFileSelect(e) {
  Array.from(e.target.files).forEach(readFile);
  e.target.value = '';
}
function onDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('dragover');
}
function onDragLeave(e) {
  document.getElementById('uploadZone').classList.remove('dragover');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
  Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.md')).forEach(readFile);
}
function readFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const note = parseMd(file.name, e.target.result);
    // 重複チェック
    if (!notes.find(n => n.filename === note.filename)) {
      notes.push(note);
      renderLoadedList();
      buildGenreTree();
      buildStatsBar();
      showToast(`✅ ${note.title} を読み込みました`);
    } else {
      showToast(`⚠ ${file.name} はすでに読み込み済みです`);
    }
  };
  reader.readAsText(file, 'utf-8');
}

function renderLoadedList() {
  const el = document.getElementById('loadedList');
  if (notes.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = notes.map((n,i) => `
    <div class="loaded-item">
      <span>${GENRE_ICONS[n.genre] || '📌'}</span>
      <span style="flex:1;font-size:0.82rem">${esc(n.title)}</span>
      <span class="genre-tag">${esc(n.genre)}</span>
      <button class="remove-btn" onclick="removeNote(${i})">✕</button>
    </div>
  `).join('');
}

function removeNote(i) {
  notes.splice(i,1);
  renderLoadedList();
  buildGenreTree();
  buildStatsBar();
}

// ===== SIDEBAR =====
function buildGenreTree() {
  const tree = document.getElementById('genreTree');
  const genreCounts = {};
  notes.forEach(n => { genreCounts[n.genre] = (genreCounts[n.genre]||0)+1; });

  const all = `<div class="tree-item ${!currentGenreFilter?'active':''}" onclick="filterGenre(null,this)">
    <span>📚</span><span>すべて</span>
    <span class="count">${notes.length}</span>
  </div>`;

  const items = GENRES.filter(g => genreCounts[g]).map(g => `
    <div class="tree-item ${currentGenreFilter===g?'active':''}" onclick="filterGenre('${g}',this)">
      <span>${GENRE_ICONS[g]}</span><span>${g}</span>
      <span class="count">${genreCounts[g]||0}</span>
    </div>
  `).join('');

  tree.innerHTML = all + items;
}

function buildStatsBar() {
  const total = notes.length;
  const quizzed = quizResults.length;
  const correct = quizResults.filter(r=>r.correct).length;
  const rate = quizzed > 0 ? Math.round(correct/quizzed*100) : 0;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-row"><span>ノート数</span><span class="stat-val">${total}</span></div>
    <div class="stat-row"><span>正答率</span><span class="stat-val">${rate}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${rate}%"></div></div>
  `;
}

function filterGenre(genre, el) {
  currentGenreFilter = genre;
  buildGenreTree();
  showView('notes-list', document.querySelector('.tab-btn'));
  renderNotesList();
}

// ===== NOTES LIST =====
function renderNotesList() {
  const filtered = currentGenreFilter ? notes.filter(n=>n.genre===currentGenreFilter) : notes;
  const el = document.getElementById('notesListContent');

  if (notes.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📂</div>
      <div class="empty-text">まだノートがありません。<br>「読込」タブから.mdファイルをアップロードしてください。</div>
    </div>`;
    return;
  }

  const genreLabel = currentGenreFilter || 'すべてのノート';
  el.innerHTML = `
    <div class="notes-header">
      <h2>${GENRE_ICONS[currentGenreFilter]||'📚'} ${genreLabel}</h2>
      <span class="badge">${filtered.length}件</span>
      ${filtered.length>0?`<button class="quiz-start-btn" style="margin-left:auto" onclick="startQuizForGenre('${currentGenreFilter||''}')">🎯 このジャンルをクイズ</button>`:''}
    </div>
    <div class="notes-grid">
      ${filtered.length===0 ? '<div style="padding:20px;color:var(--ink-light);font-size:0.82rem">このジャンルにはノートがありません</div>' :
        filtered.map((n,i) => {
          const idx = notes.indexOf(n);
          return `<div class="note-card" onclick="showNoteDetail(${idx})">
            <div class="note-card-title">${esc(n.title)}</div>
            <div class="note-card-preview">${esc(n.body)}</div>
            <div class="note-card-footer">
              <span class="note-card-date">${esc(n.genre)} ${n.date?'· '+n.date:''}</span>
              <button class="quiz-start-btn" onclick="event.stopPropagation();startQuizForNote(${idx})">クイズ</button>
            </div>
          </div>`;
        }).join('')
      }
    </div>
  `;
}

// ===== NOTE DETAIL =====
function showNoteDetail(idx) {
  currentNoteIndex = idx;
  const n = notes[idx];
  document.getElementById('noteDetailContent').innerHTML = `
    <div class="note-detail-title">${esc(n.title)}</div>
    <div class="note-detail-meta">
      <span class="meta-tag genre">${GENRE_ICONS[n.genre]||''} ${esc(n.genre)}</span>
      ${n.date?`<span class="meta-tag date">${esc(n.date)}</span>`:''}
      ${n.tags?`<span class="meta-tag date">🏷 ${esc(n.tags)}</span>`:''}
    </div>
    <div class="note-detail-content">${esc(n.body)}</div>
    <div class="note-detail-actions">
      <button class="action-btn primary" onclick="startQuizForNote(${idx})">🎯 このノートをクイズ</button>
      <button class="action-btn secondary" onclick="backToList()">← 一覧へ</button>
    </div>
  `;
  showViewDirect('note-detail');
}

function backToList() {
  showViewDirect('notes-list');
  renderNotesList();
}

// ===== QUIZ =====
async function startQuizForNote(idx) {
  const n = notes[idx];
  await generateQuiz([n], n.title);
}

async function startQuizForGenre(genre) {
  const targets = genre ? notes.filter(n=>n.genre===genre) : notes;
  if (targets.length === 0) { showToast('⚠ ノートがありません'); return; }
  await generateQuiz(targets, genre||'全ジャンル');
}

async function generateQuiz(targetNotes, label) {
  if (targetNotes.length === 0) { showToast('⚠ 対象ノートがありません'); return; }

  showLoading('AIがクイズを生成中...');

  const combined = targetNotes.slice(0,5).map(n =>
    `【${n.title}】\n${n.body.slice(0,600)}`
  ).join('\n\n---\n\n');

  const prompt = `以下の土地家屋調査士の学習ノートから、試験対策として有効なクイズを5問作成してください。

ノート内容：
${combined}

以下のJSON形式で返してください。JSON以外のテキストは一切出力しないでください：
[
  {
    "type": "choice",
    "question": "問題文",
    "choices": ["選択肢A", "選択肢B", "選択肢C", "選択肢D"],
    "answer": 0,
    "explanation": "解説文（条文根拠があれば記載）",
    "source": "出典ノートタイトル"
  },
  {
    "type": "text",
    "question": "記述式問題文",
    "answer": "模範解答",
    "explanation": "解説",
    "source": "出典ノートタイトル"
  }
]
choiceとtextを混在させてください。answerはchoicesの0始まりのインデックスです。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || '[]';
    const clean = raw.replace(/```json|```/g,'').trim();
    quizData = JSON.parse(clean);
    quizIndex = 0;
    quizResults = [];
    hideLoading();
    renderQuiz(label);
    showViewDirect('quiz');
  } catch(e) {
    hideLoading();
    showToast('❌ クイズ生成に失敗しました');
    console.error(e);
  }
}

function renderQuiz(label) {
  if (quizIndex >= quizData.length) {
    renderQuizResult(label);
    return;
  }
  const q = quizData[quizIndex];
  const el = document.getElementById('quizContent');
  const pct = Math.round(quizIndex/quizData.length*100);

  if (q.type === 'choice') {
    el.innerHTML = `
      <div class="quiz-header">
        <h2>🎯 ${esc(label)}</h2>
        <div class="quiz-progress-wrap">
          <span>${quizIndex+1}/${quizData.length}</span>
          <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="quiz-card">
        <div class="quiz-type-label">選択式</div>
        <div class="quiz-question">${esc(q.question)}</div>
        ${q.source?`<div class="quiz-source">📄 ${esc(q.source)}</div>`:''}
        <div class="answer-area" id="choiceArea">
          ${q.choices.map((c,i)=>`
            <button class="choice-btn" id="choice-${i}" onclick="selectChoice(${i},${q.answer})">${esc(c)}</button>
          `).join('')}
        </div>
        <div class="answer-result" id="answerResult"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQuiz()">次の問題 →</button>
      </div>
    `;
  } else {
    el.innerHTML = `
      <div class="quiz-header">
        <h2>🎯 ${esc(label)}</h2>
        <div class="quiz-progress-wrap">
          <span>${quizIndex+1}/${quizData.length}</span>
          <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="quiz-card">
        <div class="quiz-type-label">記述式</div>
        <div class="quiz-question">${esc(q.question)}</div>
        ${q.source?`<div class="quiz-source">📄 ${esc(q.source)}</div>`:''}
        <div class="answer-area">
          <textarea class="answer-input" id="textAnswer" placeholder="ここに答えを入力..."></textarea>
          <button class="submit-btn" onclick="submitText('${esc(q.answer)}','${esc(q.explanation)}')">答え合わせ</button>
        </div>
        <div class="answer-result" id="answerResult"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQuiz()">次の問題 →</button>
      </div>
    `;
  }
}

function selectChoice(selected, correct) {
  // ボタンを無効化
  document.querySelectorAll('.choice-btn').forEach((btn,i) => {
    btn.onclick = null;
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && selected !== correct) btn.classList.add('wrong');
  });

  const isCorrect = selected === correct;
  quizResults.push({ question: quizData[quizIndex].question, correct: isCorrect });

  const result = document.getElementById('answerResult');
  result.className = `answer-result ${isCorrect?'correct':'wrong'} show`;
  result.innerHTML = `<strong>${isCorrect?'✅ 正解！':'❌ 不正解'}</strong>${esc(quizData[quizIndex].explanation||'')}`;

  document.getElementById('nextBtn').classList.add('show');
  buildStatsBar();
}

function submitText(answer, explanation) {
  const userAns = document.getElementById('textAnswer').value.trim();
  if (!userAns) { showToast('答えを入力してください'); return; }

  // 模範解答を表示
  const result = document.getElementById('answerResult');
  result.className = 'answer-result correct show';
  result.innerHTML = `<strong>📝 模範解答</strong>${esc(answer)}<br><br><strong>解説：</strong>${esc(explanation||'')}`;

  document.querySelector('.submit-btn').style.display = 'none';
  document.getElementById('textAnswer').disabled = true;
  document.getElementById('nextBtn').classList.add('show');

  // 自己採点
  quizResults.push({ question: quizData[quizIndex].question, correct: true });
  buildStatsBar();
}

function nextQuiz() {
  quizIndex++;
  const label = document.querySelector('.quiz-header h2')?.textContent?.replace('🎯 ','') || '';
  renderQuiz(label);
}

function renderQuizResult(label) {
  const correct = quizResults.filter(r=>r.correct).length;
  const total = quizResults.length;
  const rate = Math.round(correct/total*100);
  const wrong = quizResults.filter(r=>!r.correct);

  document.getElementById('quizContent').innerHTML = `
    <div class="quiz-header">
      <h2>🎯 結果</h2>
    </div>
    <div class="result-card">
      <div style="font-size:0.82rem;color:var(--ink-light)">${esc(label)}</div>
      <div class="result-score">${rate}%</div>
      <div class="result-label">正答率</div>
      <div class="result-breakdown">
        <div class="breakdown-item">
          <div class="breakdown-val ok">${correct}</div>
          <div class="breakdown-lbl">正解</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-val ng">${total-correct}</div>
          <div class="breakdown-lbl">不正解</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-val">${total}</div>
          <div class="breakdown-lbl">合計</div>
        </div>
      </div>
      ${wrong.length>0?`
        <div class="weak-list">
          <h4>⚠ 復習が必要な問題</h4>
          ${wrong.map(r=>`<div class="weak-item">・${esc(r.question)}</div>`).join('')}
        </div>
      `:'<div style="margin-top:16px;color:var(--accent);font-size:0.9rem">🎉 全問正解！素晴らしい！</div>'}
      <button class="action-btn primary" style="margin-top:20px;width:100%" onclick="startQuizForGenre('${esc(currentGenreFilter||'')}')">
        もう一度クイズ
      </button>
      <button class="action-btn secondary" style="margin-top:8px;width:100%" onclick="backToList()">
        ノート一覧へ
      </button>
    </div>
  `;
}

// ===== VIEW CONTROL =====
function showView(viewId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  showViewDirect(viewId);
  if(viewId==='notes-list') renderNotesList();
  if(viewId==='upload') {}
}

function showViewDirect(viewId) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+viewId).classList.add('active');
  if (window.innerWidth <= 640) document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ===== LOADING =====
function showLoading(text) {
  document.getElementById('loadingText').textContent = text||'処理中...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ===== UTIL =====
function esc(t) {
  if(!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
buildGenreTree();
buildStatsBar();
</script>
</body>
</html>
